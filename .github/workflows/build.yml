name: Java CI with Gradle

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    # Ejecuta el clean para asegurar un entorno de compilación puro
    - name: Clean with Gradle
      run: ./gradlew clean

    # Ejecuta el build principal
    # Nota: He usado './gradlew build' que es el estándar de Forge/Gradle
    - name: Build with Gradle
      run: ./gradlew build

    - name: Upload Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: PackedPacks-1.20.1-Jar
        path: build/libs/*.jar
